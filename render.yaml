databases:
  - name: weblance-db
    databaseName: weblance_db
    user: weblance_db_user
    plan: free
    region: singapore

services:
  - type: web
    name: weblance
    runtime: python
    region: singapore
    plan: free
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "gunicorn weblance_project.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: weblance-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SITE_URL
        value: "https://weblance.onrender.com"
      - key: ADMIN_USER
        value: "balakrishna"
      - key: ADMIN_EMAIL
        value: "infoweblance01@gmail.com"
      - key: ADMIN_PASS
        value: "admin123"
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.smtp.EmailBackend"
      - key: EMAIL_HOST
        value: "smtp.gmail.com"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        value: "infoweblance01@gmail.com"
      - key: EMAIL_HOST_PASSWORD
        sync: false
